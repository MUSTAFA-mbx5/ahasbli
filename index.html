<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامج أحسبلي</title>
    <!-- استيراد خط كاييرو من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            /* خلفية احترافية متدرجة لضمان ظهور العناصر الشفافة */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2 { color: #ffffff; margin-bottom: 25px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4); /* حدود واضحة */
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.7); }

        input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #00d2ff;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-main:hover {
            background: #fff;
            transform: scale(1.02);
        }

        .links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .links a { color: #00d2ff; text-decoration: none; cursor: pointer; }
        .links a:hover { text-decoration: underline; }

        .hidden { display: none; }

        /* ستايل زر التذكر */
        .remember-me {
            display: flex;
            align-items: center;
            color: white;
            font-size: 14px;
            margin-top: 10px;
        }
        .remember-me input { width: auto; margin-left: 10px; }
    </style>
</head>
<body>

    <!-- واجهة تسجيل الدخول -->
    <div id="loginBox" class="glass-container">
        <h1>أحسبلي</h1>
        <input type="text" id="userEmail" placeholder="اسم المستخدم أو الهاتف">
        <input type="password" id="userPass" placeholder="كلمة المرور">
        
        <div class="remember-me">
            <input type="checkbox" id="remember">
            <label for="remember">تذكرني</label>
        </div>

        <button class="btn-main" onclick="handleLogin()">دخول</button>

        <div class="links">
            <a onclick="showPage('signupBox')">إنشاء حساب</a>
            <a onclick="alert('تواصل مع الإدارة لاستعادة الحساب')">نسيت كلمة المرور؟</a>
        </div>
    </div>

    <!-- واجهة إنشاء الحساب -->
    <div id="signupBox" class="glass-container hidden">
        <h2>إنشاء حساب</h2>
        <input type="text" id="regName" placeholder="الاسم الثلاثي">
        <input type="text" id="regLib" placeholder="اسم المكتبة">
        <input type="text" id="regPhone" placeholder="رقم الهاتف المرتبط بتليجرام">
        <input type="text" id="regAddr" placeholder="عنوان المكتبة">
        
        <button class="btn-main" onclick="registerUser()">إرسال وتفعيل</button>
        <div class="links">
            <a onclick="showPage('loginBox')" style="width:100%; text-align:center;">لديك حساب؟ سجل دخول</a>
        </div>
    </div>

    <script>
        // وظيفة التنقل بين الواجهات
        function showPage(pageId) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('signupBox').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

        function handleLogin() {
            // حالياً سننقله للواجهة الرئيسية (سنبرمجها في الخطوة القادمة)
            alert("سيتم التحقق من بياناتك...");
        }

        function registerUser() {
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;

            if(!name || !phone) {
                alert("يرجى ملء البيانات الأساسية");
                return;
            }

            // هنا نرسل البيانات لبوت التليجرام عبر رابط Google Script
            alert("تم إرسال معلوماتك بنجاح. سيصلك رد من البوت خلال لحظات.");
            // تحويل المستخدم للبوت
            window.location.href = "https://t.me/mb4x_bot";
        }
    </script>
</body>
</html>
