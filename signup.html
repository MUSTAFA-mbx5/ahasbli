<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحسبلي | إنشاء حساب</title>
    <!-- استدعاء نفس ملف التصميم لتوحيد الشكل -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <form class="form">
            <h2 style="text-align: center; color: var(--neon-purple); margin-bottom: 20px;">إنشاء حساب جديد</h2>
            
            <!-- حقل الاسم الثلاثي -->
            <div class="flex-column">
                <label>الاسم الثلاثي</label>
            </div>
            <div class="inputForm">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <input id="regName" placeholder="أدخل اسمك الكامل" class="input" type="text">
            </div>

            <!-- حقل اسم المكتبة -->
            <div class="flex-column">
                <label>اسم المكتبة</label>
            </div>
            <div class="inputForm">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <input id="regLib" placeholder="أدخل اسم مكتبتك" class="input" type="text">
            </div>

            <!-- حقل رقم الهاتف -->
            <div class="flex-column">
                <label>رقم الهاتف (مرتبط بتليجرام)</label>
            </div>
            <div class="inputForm">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                <input id="regPhone" placeholder="07XXXXXXXXX" class="input" type="text">
            </div>

            <!-- حقل العنوان -->
            <div class="flex-column">
                <label>عنوان المكتبة</label>
            </div>
            <div class="inputForm">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <input id="regAddr" placeholder="المحافظة / المنطقة" class="input" type="text">
            </div>
            
            <!-- زر الإرسال والتفعيل -->
            <button type="button" class="button-submit" onclick="auth.signup()">إرسال وتفعيل</button>
            
            <p class="p">لديك حساب بالفعل؟ <span class="span" onclick="window.location.href='index.html'">تسجيل الدخول</span></p>
        </form>
    </div>

    <!-- استدعاء نفس ملف البرمجة -->
    <script src="script.js"></script>
</body>
</html>
